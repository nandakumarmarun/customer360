<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Glow -->
  <circle cx="400" cy="400" r="300" fill="url(#paint0_radial)" fill-opacity="0.2"/>
  
  <!-- Phone Frame -->
  <rect x="250" y="100" width="300" height="600" rx="40" fill="#080E1A" stroke="#6C63FF" stroke-width="4"/>
  <rect x="260" y="110" width="280" height="580" rx="32" fill="#0D1117"/>
  
  <!-- Screen Glow -->
  <rect x="270" y="120" width="260" height="560" rx="24" fill="url(#paint1_linear)" fill-opacity="0.1"/>
  
  <!-- UI Elements - Header -->
  <rect x="300" y="150" width="100" height="10" rx="5" fill="#6C63FF" fill-opacity="0.5"/>
  <circle cx="480" cy="155" r="15" fill="#6C63FF" fill-opacity="0.2"/>
  
  <!-- UI Elements - Cards -->
  <rect x="290" y="200" width="220" height="120" rx="16" fill="url(#paint2_linear)" fill-opacity="0.8"/>
  <rect x="310" y="230" width="80" height="8" rx="4" fill="#fff" fill-opacity="0.4"/>
  <rect x="310" y="250" width="140" height="12" rx="6" fill="#fff"/>
  
  <!-- UI Elements - Stats -->
  <rect x="290" y="340" width="100" height="80" rx="12" fill="#161B22" stroke="#6C63FF" stroke-opacity="0.3"/>
  <rect x="410" y="340" width="100" height="80" rx="12" fill="#161B22" stroke="#00D4FF" stroke-opacity="0.3"/>
  
  <!-- Buttons -->
  <rect x="290" y="450" width="220" height="40" rx="20" fill="#6C63FF"/>
  <rect x="290" y="510" width="220" height="40" rx="20" fill="#161B22" stroke="#6C63FF" stroke-opacity="0.5"/>
  
  <!-- Floating Accents -->
  <circle cx="220" cy="300" r="10" fill="#00D4FF" fill-opacity="0.6">
    <animate attributeName="cy" values="300;280;300" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="580" cy="500" r="15" fill="#6C63FF" fill-opacity="0.4">
    <animate attributeName="cy" values="500;530;500" dur="4s" repeatCount="indefinite" />
  </circle>

  <defs>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 400) rotate(90) scale(300)">
      <stop stop-color="#6C63FF"/>
      <stop offset="1" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paint1_linear" x1="400" y1="120" x2="400" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C63FF"/>
      <stop offset="1" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="paint2_linear" x1="290" y1="200" x2="510" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C63FF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
</svg>
