<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 480" fill="none">
  <defs>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="vaultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="windowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="buildShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#6c63ff" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- GROUND SHADOW -->
  <ellipse cx="210" cy="465" rx="145" ry="16" fill="#6c63ff" fill-opacity="0.2"/>
  <ellipse cx="210" cy="465" rx="90" ry="9" fill="#00d4ff" fill-opacity="0.12"/>

  <!-- PEDIMENT (triangle top) -->
  <polygon points="210,28 340,95 80,95" fill="url(#roofGrad)" filter="url(#buildShadow)"/>
  <polygon points="210,42 320,95 100,95" fill="#5b52c4" fill-opacity="0.6"/>
  <!-- Pediment detail star/emblem -->
  <polygon points="210,52 215,66 230,66 218,75 223,90 210,81 197,90 202,75 190,66 205,66" fill="url(#goldGrad)"/>
  <!-- Pediment border -->
  <polygon points="210,28 340,95 80,95" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- ENTABLATURE (cornice bar) -->
  <rect x="78" y="93" width="264" height="22" rx="2" fill="url(#roofGrad)"/>
  <rect x="80" y="95" width="260" height="12" rx="1" fill="#8b85ff" fill-opacity="0.4"/>
  <rect x="78" y="112" width="264" height="6" rx="1" fill="#4f46e5"/>

  <!-- COLUMNS (6 columns) -->
  <rect x="93" y="118" width="18" height="210" rx="4" fill="url(#buildingGrad)"/>
  <rect x="94" y="118" width="6" height="210" rx="2" fill="#8b85ff" fill-opacity="0.3"/>
  <rect x="135" y="118" width="18" height="210" rx="4" fill="url(#buildingGrad)"/>
  <rect x="136" y="118" width="6" height="210" rx="2" fill="#8b85ff" fill-opacity="0.3"/>
  <rect x="177" y="118" width="18" height="210" rx="4" fill="url(#buildingGrad)"/>
  <rect x="178" y="118" width="6" height="210" rx="2" fill="#8b85ff" fill-opacity="0.3"/>
  <rect x="224" y="118" width="18" height="210" rx="4" fill="url(#buildingGrad)"/>
  <rect x="225" y="118" width="6" height="210" rx="2" fill="#8b85ff" fill-opacity="0.3"/>
  <rect x="266" y="118" width="18" height="210" rx="4" fill="url(#buildingGrad)"/>
  <rect x="267" y="118" width="6" height="210" rx="2" fill="#8b85ff" fill-opacity="0.3"/>
  <rect x="308" y="118" width="18" height="210" rx="4" fill="url(#buildingGrad)"/>
  <rect x="309" y="118" width="6" height="210" rx="2" fill="#8b85ff" fill-opacity="0.3"/>

  <!-- Column capitals (tops) -->
  <rect x="88" y="114" width="28" height="8" rx="2" fill="#6c63ff"/>
  <rect x="130" y="114" width="28" height="8" rx="2" fill="#6c63ff"/>
  <rect x="172" y="114" width="28" height="8" rx="2" fill="#6c63ff"/>
  <rect x="219" y="114" width="28" height="8" rx="2" fill="#6c63ff"/>
  <rect x="261" y="114" width="28" height="8" rx="2" fill="#6c63ff"/>
  <rect x="303" y="114" width="28" height="8" rx="2" fill="#6c63ff"/>
  <!-- Column bases -->
  <rect x="88" y="325" width="28" height="6" rx="2" fill="#6c63ff"/>
  <rect x="130" y="325" width="28" height="6" rx="2" fill="#6c63ff"/>
  <rect x="172" y="325" width="28" height="6" rx="2" fill="#6c63ff"/>
  <rect x="219" y="325" width="28" height="6" rx="2" fill="#6c63ff"/>
  <rect x="261" y="325" width="28" height="6" rx="2" fill="#6c63ff"/>
  <rect x="303" y="325" width="28" height="6" rx="2" fill="#6c63ff"/>

  <!-- BUILDING BODY (back wall) -->
  <rect x="85" y="118" width="250" height="216" fill="#1e1b4b" fill-opacity="0.9"/>

  <!-- WINDOWS (glowing) -->
  <rect x="105" y="145" width="42" height="32" rx="4" fill="url(#windowGlow)" filter="url(#glow)" opacity="0.9"/>
  <rect x="176" y="145" width="68" height="32" rx="4" fill="url(#windowGlow)" filter="url(#glow)" opacity="0.9"/>
  <rect x="273" y="145" width="42" height="32" rx="4" fill="url(#windowGlow)" filter="url(#glow)" opacity="0.9"/>
  <!-- Window reflections -->
  <rect x="108" y="148" width="18" height="10" rx="2" fill="white" fill-opacity="0.3"/>
  <rect x="179" y="148" width="28" height="10" rx="2" fill="white" fill-opacity="0.3"/>
  <rect x="276" y="148" width="18" height="10" rx="2" fill="white" fill-opacity="0.3"/>

  <!-- Second row windows -->
  <rect x="105" y="195" width="42" height="30" rx="4" fill="url(#windowGlow)" filter="url(#glow)" opacity="0.7"/>
  <rect x="273" y="195" width="42" height="30" rx="4" fill="url(#windowGlow)" filter="url(#glow)" opacity="0.7"/>
  <rect x="108" y="198" width="18" height="9" rx="2" fill="white" fill-opacity="0.25"/>
  <rect x="276" y="198" width="18" height="9" rx="2" fill="white" fill-opacity="0.25"/>

  <!-- VAULT DOOR (center feature) -->
  <rect x="163" y="220" width="94" height="116" rx="6" fill="url(#vaultGrad)"/>
  <rect x="163" y="220" width="94" height="116" rx="6" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Vault circular door -->
  <circle cx="210" cy="278" r="40" fill="#374151" stroke="url(#doorGrad)" stroke-width="3"/>
  <circle cx="210" cy="278" r="33" fill="#1f2937" stroke="#4b5563" stroke-width="1.5"/>
  <!-- Vault wheel spokes -->
  <line x1="210" y1="248" x2="210" y2="308" stroke="#00d4ff" stroke-width="2.5" opacity="0.8"/>
  <line x1="180" y1="278" x2="240" y2="278" stroke="#00d4ff" stroke-width="2.5" opacity="0.8"/>
  <line x1="189" y1="257" x2="231" y2="299" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <line x1="231" y1="257" x2="189" y2="299" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <!-- Vault center handle -->
  <circle cx="210" cy="278" r="12" fill="url(#doorGrad)" filter="url(#glow)"/>
  <circle cx="210" cy="278" r="7" fill="#0ea5e9"/>
  <circle cx="210" cy="278" r="3" fill="#00d4ff"/>
  <!-- Vault bolts -->
  <circle cx="173" cy="230" r="4" fill="#00d4ff" opacity="0.8"/>
  <circle cx="247" cy="230" r="4" fill="#00d4ff" opacity="0.8"/>
  <circle cx="173" cy="326" r="4" fill="#00d4ff" opacity="0.8"/>
  <circle cx="247" cy="326" r="4" fill="#00d4ff" opacity="0.8"/>

  <!-- STEPS -->
  <rect x="75" y="331" width="270" height="14" rx="2" fill="#312e81"/>
  <rect x="60" y="343" width="300" height="14" rx="2" fill="#4338ca"/>
  <rect x="45" y="355" width="330" height="18" rx="3" fill="#4f46e5"/>
  <rect x="45" y="355" width="330" height="8" rx="3" fill="#6c63ff" fill-opacity="0.4"/>

  <!-- GOLD LETTERING band -->
  <rect x="88" y="321" width="244" height="12" rx="1" fill="url(#goldGrad)" opacity="0.8"/>
  <!-- Letter lines (stylized) -->
  <line x1="110" y1="324" x2="160" y2="324" stroke="#1f2937" stroke-width="1.5" opacity="0.6"/>
  <line x1="170" y1="324" x2="250" y2="324" stroke="#1f2937" stroke-width="1.5" opacity="0.6"/>
  <line x1="260" y1="324" x2="310" y2="324" stroke="#1f2937" stroke-width="1.5" opacity="0.6"/>
  <line x1="110" y1="329" x2="310" y2="329" stroke="#1f2937" stroke-width="1" opacity="0.4"/>

  <!-- Digital scan line effect -->
  <rect x="85" y="118" width="250" height="2" rx="1" fill="#00d4ff" fill-opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,200;0,0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
